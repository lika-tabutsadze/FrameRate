<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/font.css" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>FrameRate - ფილმები</title>
  </head>
  <body>

    <!-- --------HEADER-------- -->

    <header class="main__header">
        <div class="container header__container">
            <a href="./index.html" class="logo"><i class="fas fa-film"></i> Frame<span>Rate</span></a>
            <nav class="navbar" id="navbar">
                <ul class="nav__list">
                    <li><a class="nav__link nav__link--active" href="#">მთავარი</a></li>
                    <li><a class="nav__link" href="#">ფილმები</a></li>
                    <li><a class="nav__link" href="#">სიახლეები</a></li>
                    <li><a class="nav__link" href="#">ჩვენ შესახებ</a></li>
                    <li><a class="nav__link" href="#">კონტაქტი</a></li>
                </ul>
            </nav>
            <button class="burger__menu" id="burger--toggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main>

      <!-- ----------HERO SECTION---------- -->

      <section id="hero" class="hero__section">
            <div class="hero__gradiant"></div>
            <div class="container hero__content">
                <h1 class="hero__title">შენი მეგზური კინოსამყაროში</h1>
                <p class="hero__text">აღმოაჩინე პოპულარული ფილმები, გაიგე მათი რეიტინგები და თვალი ადევნე სიახლეებს.</p>
                <a href="#" class="btn--primary">რას ვუყუროთ?</a>
            </div>
        </section>

        <!-- ======== MOVIE SECTION ====== -->

        <section id="trending" class="movies__section">
            <div class="container">
                <h2 class="section__title">ამჟამად პოპულარული</h2>
                <div class="movies__grid" id="movies__container">
                    </div>
            </div>
        </section>


    </main>

    <script src="./app.js"></script>
  </body>
</html>
